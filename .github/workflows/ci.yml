name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clipforge
          POSTGRES_PASSWORD: clipforge
          POSTGRES_DB: clipforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - name: Validate migrations
        run: pnpm --dir packages/database exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://clipforge:clipforge@localhost:5432/clipforge?schema=public

      - run: pnpm typecheck
